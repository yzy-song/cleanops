name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PNPM_VERSION: "10"

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @cleanops/db exec prisma generate

      - name: TypeCheck API
        run: pnpm --filter @cleanops/api exec tsc --noEmit

      - name: TypeCheck Web
        run: pnpm --filter @cleanops/web exec tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @cleanops/db exec prisma generate

      - name: Build API
        run: pnpm --filter @cleanops/api build

      - name: Build Web
        run: pnpm --filter @cleanops/web build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Lint API
        run: pnpm --filter @cleanops/api lint
        continue-on-error: true

      - name: Lint Web
        run: pnpm --filter @cleanops/web lint
        continue-on-error: true
