name: Deploy CleanOps API

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/db/**"
      - ".github/workflows/deploy-cleanops.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@10.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: cd packages/db && npx prisma generate

      - name: Build @cleanops/db
        run: cd packages/db && pnpm build

      - name: Build API
        run: cd apps/api && npx nest build

      - name: Deploy to server
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new"
          SCP="scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new"

          RELEASE_DIR="/var/www/cleanops/releases/$GITHUB_SHA"
          $SSH $SSH_USER@$SSH_HOST "sudo mkdir -p $RELEASE_DIR && sudo chown ubuntu:ubuntu $RELEASE_DIR"

          cd apps/api
          tar czf /tmp/dist.tar.gz dist
          $SCP /tmp/dist.tar.gz $SSH_USER@$SSH_HOST:$RELEASE_DIR/

          $SSH $SSH_USER@$SSH_HOST "
            set -e
            cd $RELEASE_DIR
            tar xzf dist.tar.gz && rm dist.tar.gz
            ln -sf /var/www/cleanops/repo/apps/api/node_modules dist/node_modules
            sudo ln -nfs $RELEASE_DIR/dist /var/www/cleanops/current
            cd /var/www/cleanops/repo
            cd packages/db && sudo DATABASE_URL='postgresql://cleanops:310521@localhost:5432/db-cleanops' npx prisma migrate deploy
            sudo -u cleanops pm2 restart cleanops
            ls -dt /var/www/cleanops/releases/*/ 2>/dev/null | tail -n +6 | sudo xargs rm -rf 2>/dev/null || true
          "
